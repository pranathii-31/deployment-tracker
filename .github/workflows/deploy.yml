name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

  
      - name: Setup shell check
        run: |
          & "C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe" echo "PowerShell working"

    
      - name: Check Node
        run: |
          & "C:\Program Files\nodejs\node.exe" -v

 
      - name: Check .NET
        run: |
          & "C:\Program Files\dotnet\dotnet.exe" --version

   
      - name: Install dependencies
        run: |
          & "C:\Program Files\nodejs\npm.cmd" install

      
      - name: Build project
        run: |
          & "C:\Program Files\nodejs\npm.cmd" run build

   
      - name: Deploy app
        run: |
          echo "Deploying app..."
          # Example:
          # Copy-Item -Path "dist\*" -Destination "C:\deploy\app" -Recurse -Force


      - name: Backup current deployment
        run: |
          $timestamp = Get-Date -Format "yyyyMMddHHmmss"
          $backupPath = "C:\deploy\backup_$timestamp"
          New-Item -ItemType Directory -Path $backupPath -Force
          Copy-Item -Path "C:\deploy\app\*" -Destination $backupPath -Recurse -Force
