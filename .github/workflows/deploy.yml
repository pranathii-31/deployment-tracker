name: Build and Deploy Deployment Tracker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    # ===========================
    # BACKUP
    # ===========================

    - name: Backup Backend
      shell: powershell
      run: |
        iisreset /stop 
        if (!(Test-Path 'C:\backups')) { New-Item -ItemType Directory -Path 'C:\backups' }
        if (Test-Path 'C:\deployment-api') {
          $timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
          Compress-Archive -Path 'C:\deployment-api\*' -DestinationPath "C:\backups\backend_$timestamp.zip" -Force
        }
        iisreset /start

    - name: Backup Frontend
      shell: powershell
      run: |
        if (!(Test-Path 'C:\backups')) { New-Item -ItemType Directory -Path 'C:\backups' }
        if (Test-Path 'C:\dashboard') {
          $timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
          Compress-Archive -Path 'C:\dashboard\*' -DestinationPath "C:\backups\frontend_$timestamp.zip" -Force
        }

    # ===========================
    # FRONTEND
    # ===========================

    - name: Install Frontend Dependencies
      working-directory: frontend/deployment-dashboard
      shell: powershell
      run: npm install

    - name: Build Frontend
      working-directory: frontend/deployment-dashboard
      shell: powershell
      run: npm run build -- --configuration production

    - name: Deploy Frontend
      shell: powershell
      run: |
        if (!(Test-Path 'C:\dashboard')) { New-Item -ItemType Directory -Path 'C:\dashboard' }
        Remove-Item -Recurse -Force 'C:\dashboard\*' -ErrorAction SilentlyContinue
        Copy-Item -Recurse -Force "$env:GITHUB_WORKSPACE\frontend\deployment-dashboard\dist\deployment-dashboard\browser\*" 'C:\dashboard\'

    # ===========================
    # BACKEND
    # ===========================

    - name: Restore Backend
      working-directory: backend/DeploymentTrackerAPI
      shell: powershell
      run: dotnet restore

    - name: Build Backend
      working-directory: backend/DeploymentTrackerAPI
      shell: powershell
      run: dotnet build --configuration Release

    - name: Publish Backend
      working-directory: backend/DeploymentTrackerAPI
      shell: powershell
      run: dotnet publish -c Release -o publish

    - name: Deploy Backend
      shell: powershell
      run: |
        if (!(Test-Path 'C:\deployment-api')) { New-Item -ItemType Directory -Path 'C:\deployment-api' }
        iisreset /stop
        Remove-Item -Recurse -Force 'C:\deployment-api\*' -ErrorAction SilentlyContinue
        Copy-Item -Recurse -Force "$env:GITHUB_WORKSPACE\backend\DeploymentTrackerAPI\publish\*" 'C:\deployment-api\'
        iisreset /start

    # ===========================
    # RESTART IIS
    # ===========================

    - name: Restart IIS
      shell: powershell
      run: iisreset
