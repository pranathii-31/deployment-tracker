name: Build and Deploy Deployment Tracker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # -------------------------
    # Checkout repo
    # -------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # -------------------------
    # Setup Node (Angular)
    # -------------------------
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Install Angular dependencies
    - name: Install Angular dependencies
      working-directory: frontend/deployment-dashboard
      run: npm install

    # Build Angular
    - name: Build Angular project
      working-directory: frontend/deployment-dashboard
      run: npm run build -- --configuration production

    # -------------------------
    # Setup .NET
    # -------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # Restore backend
    - name: Restore .NET dependencies
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet restore --force

    # Build backend
    - name: Build .NET API
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet build --configuration Release --no-restore

    # Publish backend
    - name: Publish .NET API
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet publish -c Release -o publish --no-cache

    # -------------------------
    # Deploy Backend
    # -------------------------
    - name: Deploy Backend API
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: "backend/DeploymentTrackerAPI/publish/*"
        target: "C:/deployment-api"

    # -------------------------
    # Deploy Angular Dashboard
    # -------------------------
    - name: Deploy Angular Dashboard
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: "frontend/deployment-dashboard/dist/deployment-dashboard/*"
        target: "C:/dashboard"
