name: Build and Deploy Deployment Tracker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    # -----------------------------
    # Checkout Code
    # -----------------------------
    - name: Checkout code
      uses: actions/checkout@v3

    # -----------------------------
    # Setup .NET
    # -----------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    # -----------------------------
    # Restore Backend
    # -----------------------------
    - name: Restore .NET dependencies
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet restore --force

    # -----------------------------
    # Build Backend
    # -----------------------------
    - name: Build .NET API
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet build --configuration Release --no-restore

    # -----------------------------
    # Publish Backend
    # -----------------------------
    - name: Publish .NET API
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet publish -c Release -o publish --no-cache

    # -----------------------------
    # Setup Node (Frontend)
    # -----------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # -----------------------------
    # Install & Build Angular
    # -----------------------------
    - name: Install dependencies
      working-directory: frontend/deployment-dashboard
      run: npm install

    - name: Build Angular App
      working-directory: frontend/deployment-dashboard
      run: npm run build -- --configuration production

    # =============================
    # 🔁 BACKUP (ROLLBACK SUPPORT)
    # =============================

    # Backup Backend
    - name: Backup Backend
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          if (!(Test-Path "C:\backups")) { New-Item -ItemType Directory -Path "C:\backups" }
          powershell Compress-Archive -Path C:\deployment-api\* -DestinationPath C:\backups\backend_$(Get-Date -Format yyyyMMddHHmmss).zip -Force

    # Backup Frontend
    - name: Backup Frontend
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          if (!(Test-Path "C:\backups")) { New-Item -ItemType Directory -Path "C:\backups" }
          powershell Compress-Archive -Path C:\dashboard\* -DestinationPath C:\backups\frontend_$(Get-Date -Format yyyyMMddHHmmss).zip -Force

    # =============================
    # 🚀 DEPLOYMENT
    # =============================

    # Deploy Backend
    - name: Deploy Backend API
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: "backend/DeploymentTrackerAPI/publish/*"
        target: "C:/deployment-api"

    # Deploy Frontend
    - name: Deploy Angular Dashboard
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: "frontend/deployment-dashboard/dist/deployment-dashboard/browser/*"
        target: "C:/dashboard"

    # Restart IIS
    - name: Restart IIS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          iisreset
