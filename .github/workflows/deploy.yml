name: Build and Deploy Deployment Tracker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Windows]   

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    # ===========================
    # BACKUP (same logic, no SSH)
    # ===========================

    - name: Backup Backend (Versioned)
      run: |
        iisreset /stop
        if (!(Test-Path 'C:\backups')) {
          New-Item -ItemType Directory -Path 'C:\backups'
        }

        if (Test-Path 'C:\deployment-api') {
          $timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
          $zipPath = 'C:\backups\backend_' + $timestamp + '.zip'
          Compress-Archive -Path 'C:\deployment-api\*' -DestinationPath $zipPath -Force
        }
        iisreset /start


    - name: Backup Frontend (Versioned)
      run: |
        if (!(Test-Path 'C:\backups')) {
          New-Item -ItemType Directory -Path 'C:\backups'
        }

        if (Test-Path 'C:\dashboard') {
          $timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
          $zipPath = 'C:\backups\frontend_' + $timestamp + '.zip'
          Compress-Archive -Path 'C:\dashboard\*' -DestinationPath $zipPath -Force
        }


    # ===========================
    # FRONTEND BUILD + DEPLOY
    # ===========================

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      working-directory: frontend/deployment-dashboard
      run: npm install

    - name: Build Angular
      working-directory: frontend/deployment-dashboard
      run: npm run build -- --configuration production

    - name: Deploy Frontend
      run: |
        Remove-Item -Recurse -Force "C:\dashboard\*"
        Copy-Item -Recurse -Force "frontend/deployment-dashboard/dist/deployment-dashboard/browser/*" "C:\dashboard"


    # ===========================
    # BACKEND BUILD + DEPLOY
    # ===========================

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet restore

    - name: Build
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet build --configuration Release

    - name: Publish
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet publish -c Release -o publish

    - name: Deploy Backend
      run: |
        iisreset /stop
        Remove-Item -Recurse -Force "C:\deployment-api\*"
        Copy-Item -Recurse -Force "backend/DeploymentTrackerAPI/publish/*" "C:\deployment-api"
        iisreset /start


    # ===========================
    # RESTART IIS
    # ===========================

    - name: Restart IIS
      run: iisreset
