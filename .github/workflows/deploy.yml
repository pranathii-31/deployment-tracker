name: Build and Deploy Deployment Tracker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # ---------------------------
    # Checkout Code
    # ---------------------------
    - name: Checkout
      uses: actions/checkout@v4


    # ===========================
    # BACKUP (ROLLBACK SYSTEM)
    # ===========================

    - name: Backup Backend (Versioned)
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          powershell -Command "
          if (!(Test-Path 'C:\backups')) {
            New-Item -ItemType Directory -Path 'C:\backups'
          }

          if (Test-Path 'C:\deployment-api') {
            \$timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
            \$zipPath = 'C:\backups\backend_' + \$timestamp + '.zip'
            Compress-Archive -Path 'C:\deployment-api\*' -DestinationPath \$zipPath -Force
          }
          "


    - name: Backup Frontend (Versioned)
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          powershell -Command "
          if (!(Test-Path 'C:\backups')) {
            New-Item -ItemType Directory -Path 'C:\backups'
          }

          if (Test-Path 'C:\dashboard') {
            \$timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
            \$zipPath = 'C:\backups\frontend_' + \$timestamp + '.zip'
            Compress-Archive -Path 'C:\dashboard\*' -DestinationPath \$zipPath -Force
          }
          "


    # ===========================
    # FRONTEND BUILD + DEPLOY
    # ===========================

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      working-directory: frontend/deployment-dashboard
      run: npm install

    - name: Build Angular
      working-directory: frontend/deployment-dashboard
      run: npm run build -- --configuration production

    - name: Deploy Frontend
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: "frontend/deployment-dashboard/dist/deployment-dashboard/browser/*"
        target: "C:/dashboard"


    # ===========================
    # BACKEND BUILD + DEPLOY
    # ===========================

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet restore

    - name: Build
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet build --configuration Release

    - name: Publish
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet publish -c Release -o publish

    - name: Deploy Backend
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: "backend/DeploymentTrackerAPI/publish/*"
        target: "C:/deployment-api"


    # ===========================
    # RESTART IIS
    # ===========================

    - name: Restart IIS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          iisreset
