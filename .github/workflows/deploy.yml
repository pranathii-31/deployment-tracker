name: Build and Deploy Deployment Tracker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Backup Backend
    - name: Backup Backend
      shell: powershell
      run: |
        if (!(Test-Path "C:\backups")) {
          New-Item -ItemType Directory -Path "C:\backups"
        }

        if (Test-Path "C:\deployment-api") {
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $zipPath = "C:\backups\backend_$timestamp.zip"
          Compress-Archive -Path "C:\deployment-api\*" -DestinationPath $zipPath -Force
        }

    # Backup Frontend
    - name: Backup Frontend
      shell: powershell
      run: |
        if (Test-Path "C:\dashboard") {
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $zipPath = "C:\backups\frontend_$timestamp.zip"
          Compress-Archive -Path "C:\dashboard\*" -DestinationPath $zipPath -Force
        }

    # Build Frontend
    - name: Build Frontend
      shell: powershell
      run: |
        cd frontend/deployment-dashboard
        npm install
        npm run build -- --configuration production

    # Deploy Frontend
    - name: Deploy Frontend
      shell: powershell
      run: |
        Remove-Item -Recurse -Force "C:\dashboard\*" -ErrorAction SilentlyContinue
        Copy-Item -Recurse -Force "frontend/deployment-dashboard/dist/deployment-dashboard/browser/*" "C:\dashboard"

    # Build Backend
    - name: Build Backend
      shell: powershell
      run: |
        cd backend/DeploymentTrackerAPI
        dotnet restore
        dotnet publish -c Release -o publish

    # Deploy Backend
    - name: Deploy Backend
      shell: powershell
      run: |
        iisreset /stop
        Remove-Item -Recurse -Force "C:\deployment-api\*" -ErrorAction SilentlyContinue
        Copy-Item -Recurse -Force "backend/DeploymentTrackerAPI/publish/*" "C:\deployment-api"
        iisreset /start
