name: Build and Deploy Deployment Tracker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # -----------------------------
    # Checkout
    # -----------------------------
    - name: Checkout
      uses: actions/checkout@v4

    # =============================
    # 🔁 BACKUP BEFORE DEPLOY
    # =============================

    - name: Backup Backend
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          if not exist C:\backups mkdir C:\backups
          powershell -Command "Compress-Archive -Path C:\deployment-api\* -DestinationPath C:\backups\backend.zip -Force"

    - name: Backup Frontend
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          if not exist C:\backups mkdir C:\backups
          powershell -Command "Compress-Archive -Path C:\dashboard\* -DestinationPath C:\backups\frontend.zip -Force"

    # =============================
    # 🚀 FRONTEND (UNCHANGED)
    # =============================

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      working-directory: frontend/deployment-dashboard
      run: npm install

    - name: Build Angular
      working-directory: frontend/deployment-dashboard
      run: npm run build -- --configuration production

    - name: Deploy Frontend
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: "frontend/deployment-dashboard/dist/deployment-dashboard/browser/*"
        target: "C:/dashboard"

    # =============================
    # 🚀 BACKEND (UNCHANGED)
    # =============================

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet restore

    - name: Build
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet build --configuration Release

    - name: Publish
      working-directory: backend/DeploymentTrackerAPI
      run: dotnet publish -c Release -o publish

    - name: Deploy Backend
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        source: "backend/DeploymentTrackerAPI/publish/*"
        target: "C:/deployment-api"

    # =============================
    # 🔄 RESTART IIS
    # =============================

    - name: Restart IIS
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VM_HOST }}
        username: ${{ secrets.VM_USERNAME }}
        password: ${{ secrets.VM_PASSWORD }}
        script: |
          iisreset
