name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Choose component to rollback"
        required: true
        type: choice
        options:
          - frontend
          - backend
      version:
        description: "Enter backup file name (example: frontend_20260401_064409.zip)"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:

      # 🔹 Step 1: Create PowerShell script on VM
      - name: Create rollback script on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            echo $component = "${{ github.event.inputs.component }}" > C:\rollback.ps1
            echo $version = "${{ github.event.inputs.version }}" >> C:\rollback.ps1

            echo Write-Host "=====================" >> C:\rollback.ps1
            echo Write-Host "Component: $component" >> C:\rollback.ps1
            echo Write-Host "Version: $version" >> C:\rollback.ps1
            echo Write-Host "=====================" >> C:\rollback.ps1

            echo if ($component -eq "frontend") { >> C:\rollback.ps1
            echo   Write-Host "Rolling back frontend..." >> C:\rollback.ps1
            echo   Remove-Item -Recurse -Force "C:\dashboard\*" >> C:\rollback.ps1
            echo   Expand-Archive -Path "C:\backups\$version" -DestinationPath "C:\dashboard" -Force >> C:\rollback.ps1
            echo   iisreset >> C:\rollback.ps1
            echo   Write-Host "Frontend rollback SUCCESS" >> C:\rollback.ps1
            echo } >> C:\rollback.ps1

            echo if ($component -eq "backend") { >> C:\rollback.ps1
            echo   Write-Host "Rolling back backend..." >> C:\rollback.ps1
            echo   iisreset /stop >> C:\rollback.ps1
            echo   Remove-Item -Recurse -Force "C:\deployment-api\*" >> C:\rollback.ps1
            echo   Expand-Archive -Path "C:\backups\$version" -DestinationPath "C:\deployment-api" -Force >> C:\rollback.ps1
            echo   iisreset /start >> C:\rollback.ps1
            echo   Write-Host "Backend rollback SUCCESS" >> C:\rollback.ps1
            echo } >> C:\rollback.ps1

      # 🔹 Step 2: Execute script
      - name: Execute rollback script
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            powershell -ExecutionPolicy Bypass -File C:\rollback.ps1
