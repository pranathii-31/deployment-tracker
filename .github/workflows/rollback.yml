name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Component to rollback"
        required: true
        type: choice
        options:
          - frontend
          - backend
      version:
        description: "Backup file name"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:

      - name: Validate Backup
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            powershell -Command "if (!(Test-Path 'C:\backups\${{ github.event.inputs.version }}')) { exit 1 }"

      - name: Rollback Frontend
        if: ${{ github.event.inputs.component == 'frontend' }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            powershell -Command "Remove-Item -Recurse -Force 'C:\dashboard\*'; Expand-Archive -Path 'C:\backups\${{ github.event.inputs.version }}' -DestinationPath 'C:\dashboard' -Force; iisreset"

      - name: Rollback Backend
        if: ${{ github.event.inputs.component == 'backend' }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            powershell -Command "iisreset /stop; Remove-Item -Recurse -Force 'C:\deployment-api\*'; Expand-Archive -Path 'C:\backups\${{ github.event.inputs.version }}' -DestinationPath 'C:\deployment-api' -Force; iisreset /start"
