name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      component:
        description: "Choose component to rollback"
        required: true
        type: choice
        options:
          - frontend
          - backend
      version:
        description: "Enter backup file name (example: frontend_20260401_064409.zip)"
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:

      # ===========================
      # STEP 1: CREATE PS SCRIPT
      # ===========================
      - name: Create rollback script on VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            powershell -Command "
            \$script = @'
param(
  [string]\$component,
  [string]\$version
)

Write-Host '====================='
Write-Host \"Component: \$component\"
Write-Host \"Version: \$version\"
Write-Host '====================='

if (\$component -eq 'frontend') {
  Write-Host 'Rolling back frontend...'

  if (Test-Path 'C:\dashboard') {
    Remove-Item -Recurse -Force 'C:\dashboard\*'
  }

  Expand-Archive -Path \"C:\backups\\\$version\" -DestinationPath 'C:\dashboard' -Force

  iisreset
  Write-Host 'Frontend rollback SUCCESS'
}

if (\$component -eq 'backend') {
  Write-Host 'Rolling back backend...'

  iisreset /stop

  if (Test-Path 'C:\deployment-api') {
    Remove-Item -Recurse -Force 'C:\deployment-api\*'
  }

  Expand-Archive -Path \"C:\backups\\\$version\" -DestinationPath 'C:\deployment-api' -Force

  iisreset /start
  Write-Host 'Backend rollback SUCCESS'
}
'@

            \$script | Out-File -FilePath C:\rollback.ps1 -Encoding utf8
            "


      # ===========================
      # STEP 2: EXECUTE SCRIPT
      # ===========================
      - name: Execute rollback script
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            powershell -ExecutionPolicy Bypass -File C:\rollback.ps1 `
              -component "${{ github.event.inputs.component }}" `
              -version "${{ github.event.inputs.version }}"
