name: Rollback

on:
  workflow_dispatch:  # manual trigger

jobs:
  rollback:
    runs-on: self-hosted

    steps:
      - name: Rollback deployment
        run: |
          Write-Output "Starting rollback..."

          $backupRoot = "C:\deploy"
          $latestBackup = Get-ChildItem $backupRoot -Directory |
                          Where-Object { $_.Name -like "backup_*" } |
                          Sort-Object LastWriteTime -Descending |
                          Select-Object -First 1

          if ($null -eq $latestBackup) {
              Write-Error "No backup found!"
              exit 1
          }

          Write-Output "Restoring from $($latestBackup.FullName)"

          Remove-Item "C:\deploy\app\*" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "$($latestBackup.FullName)\*" -Destination "C:\deploy\app" -Recurse -Force

          Write-Output "Rollback completed successfully"
